<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cap Cordes</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=block" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #555555;
            --accent: #000000;
            --border: #eeeeee;
            --sidebar-width: 280px;
            --font-titles: 'Orbitron', sans-serif;
            --font-body: 'Xenara', 'Times New Roman', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        /* Structure stabilisée */
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            line-height: 1.6;
            margin: 0;
        }

        /* 2. RÉSERVATION STRICTE DE L'ESPACE MENU */
        cap-cordes-menu {
            display: block;
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            flex-shrink: 0;
            background-color: #fff;
        }

        /* 3. STABILISATION DU LOGO (Dimensions fixes) */
        .logo-img { 
            width: 220px !important;
            height: 80px !important;  
            display: block; 
            margin-bottom: 40px; 
            object-fit: contain;
        }

        /* 4. STABILISATION DES ONGLETS DU MENU */
        nav ul { list-style: none; }
        nav ul li { 
            margin-bottom: 12px; 
            height: 24px; /* Verrouille la ligne pour Orbitron */
            display: flex;
            align-items: center;
        }
        nav ul li a { 
            font-family: var(--font-titles); 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            white-space: nowrap;
            line-height: 1;
        }

        /* 5. STRUCTURE ASIDE (Injectée via menu.js) */
        aside { 
            width: var(--sidebar-width); 
            height: 100vh; 
            position: fixed; 
            left: 0; top: 0; 
            border-right: 1px solid var(--border); 
            padding: 40px 30px; 
            display: flex; 
            flex-direction: column; 
            background: #fff; 
            z-index: 500; 
        }

        /* --- CONTENU PRINCIPAL --- */
        main {
            flex-grow: 1;
            min-width: 0;
            display: flex;
            justify-content: center;
        }

        .content-wrapper {
            max-width: 850px;
            width: 100%;
            padding: 100px 20px;
            text-align: center;
        }

        /* --- STYLE SPÉCIFIQUE CONTACT --- */
        h1 { font-family: var(--font-titles); text-transform: uppercase; font-size: 2.5rem; margin-bottom: 60px; letter-spacing: 2px; }
        .contact-card { margin-bottom: 40px; }
        .label { font-family: var(--font-titles); font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; }
        .info-value { font-size: 1.4rem; font-weight: bold; text-decoration: none; color: var(--text-main); }
        .address { font-size: 1.1rem; color: var(--text-main); }
        .btn { font-family: var(--font-titles); display: inline-block; padding: 18px 40px; border: 1px solid var(--accent); text-decoration: none; color: #fff; background: var(--accent); font-size: 0.75rem; text-transform: uppercase; border-radius: 50px; margin-top: 30px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }

        .burger-btn { display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; background: #fff; border: 1px solid var(--border); padding: 10px; cursor: pointer; border-radius: 5px; }
        .burger-btn span { display: block; width: 25px; height: 2px; background: var(--accent); margin: 5px 0; transition: 0.3s; }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            cap-cordes-menu { width: 0; min-width: 0; }
            .burger-btn { display: block; }
            aside { transform: translateX(-100%); transition: transform 0.3s ease; width: 280px; }
            aside.open { transform: translateX(0); }
            main { width: 100%; }
            .content-wrapper { padding: 80px 20px; }
            h1 { font-size: 2rem; margin-bottom: 40px; }
        }
    </style>
    <script src="menu.js"></script>
</head>
<body>

    <cap-cordes-menu></cap-cordes-menu>

    <main>
        <div class="content-wrapper">
            <h1>Contact</h1>

            <div class="contact-card">
                <p class="label">Téléphone</p>
                <a href="tel:+33783048294" class="info-value">07 83 04 82 94</a>
            </div>

            <div class="contact-card">
                <p class="label">Email</p>
                <a href="mailto:contact@capcordes.fr" class="info-value" style="font-size: 1.1rem;">contact@capcordes.fr</a>
            </div>

            <div class="contact-card">
                <p class="label">Atelier</p>
                <p class="address">
                    <strong>Atelier 35</strong><br>
                    67 avenue de Verdun<br>
                    77470 Trilport
                </p>
            </div>

            <a href="tel:+33783048294" class="btn">Appeler maintenant</a>
        </div>
    </main>
</body>
</html>
