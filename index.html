<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap Cordes | Inspection et Travaux</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #555555;
            --accent: #000000;
            --border: #dddddd;
            --sidebar-width: 280px;
            --font-titles: 'Orbitron', sans-serif;
            --font-body: 'Xenara', 'Times New Roman', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            line-height: 1.6;
        }

        /* --- BOUTON BURGER (MOBILE UNIQUEMENT) --- */
        .burger-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: #fff;
            border: 1px solid var(--border);
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .burger-btn span {
            display: block;
            width: 25px;
            height: 2px;
            background: var(--accent);
            margin: 5px 0;
            transition: 0.3s;
        }

        /* --- SIDEBAR --- */
        aside {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #eee;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 150;
            transition: transform 0.3s ease-in-out;
        }

        .logo-container { margin-bottom: 40px; }
        .logo-img { max-width: 100%; height: auto; }

        nav ul { list-style: none; }
        nav ul li { margin-bottom: 12px; }
        nav ul li a {
            font-family: var(--font-titles);
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- MAIN CONTENT --- */
        main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            display: flex;
            justify-content: center;
        }

        .content-wrapper {
            max-width: 850px;
            width: 100%;
            padding: 60px 20px;
            text-align: center;
        }

        /* --- SECTIONS --- */
        section { margin-bottom: 120px; }
        h1 { font-family: var(--font-titles); text-transform: uppercase; font-size: 2rem; margin-bottom: 15px; }
        .subtitle { font-family: var(--font-titles); text-transform: uppercase; font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 60px; }
        .price { font-family: var(--font-titles); font-size: 2.2rem; font-weight: 700; margin: 10px 0 40px 0; }
        .hero-img { width: 100%; height: 450px; object-fit: cover; margin-bottom: 60px; }
        .photo-duo { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 50px 0; }
        .photo-duo img { width: 100%; height: 380px; object-fit: cover; }
        
        .btn {
            font-family: var(--font-titles);
            display: inline-block;
            padding: 18px 40px;
            border: 1px solid var(--accent);
            text-decoration: none;
            color: var(--accent);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 50px;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 1024px) {
            .burger-btn { display: block; }
            
            aside {
                transform: translateX(-100%); /* Caché à gauche */
                box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            }

            aside.open {
                transform: translateX(0); /* Affiche le menu */
            }

            main {
                margin-left: 0;
                width: 100%;
            }

            .hero-img { height: 300px; }
            .photo-duo { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="burger-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <aside id="sidebar">
        <div class="logo-container">
            <img src="logo.png" alt="Cap Cordes" class="logo-img">
        </div>
        <nav>
            <ul>
                <li><a href="#accueil" onclick="toggleMenu()">Forfait inspection toiture</a></li>
                <li><a href="#restauration" onclick="toggleMenu()">Restauration de pierre</a></li>
                <li><a href="#infiltration" onclick="toggleMenu()">Recherche d'infiltration</a></li>
                <li><a href="#entretien" onclick="toggleMenu()">Entretien</a></li>
                <li><a href="#courettes" onclick="toggleMenu()">Rénovation de courettes</a></li>
                <li><a href="#speciaux" onclick="toggleMenu()">Travaux spéciaux</a></li>
                <li><a href="#a-propos" onclick="toggleMenu()">Qui sommes nous ?</a></li>
                <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="content-wrapper">
            <section id="accueil">
                <img src="vue-paris.jpg" alt="Toits de Paris" class="hero-img">
                <h1>Inspection de toiture et façade</h1>
                <div class="subtitle">Immeubles Haussmanniens</div>
                <div class="price">600€ HT</div>
                <a href="#contact" class="btn">Réserver une inspection</a>
            </section>

            </div>
    </main>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            // On ne déclenche l'ouverture que si on est sur mobile
            if (window.innerWidth <= 1024) {
                sidebar.classList.toggle('open');
            }
        }
    </script>

</body>
</html>
